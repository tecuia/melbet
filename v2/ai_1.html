<!-- Три скрипта анимаций -->
<script src="anim1.js?1782140352340"></script>
<script>
// ========== ОБЪЕДИНЁННАЯ ИНИЦИАЛИЗАЦИЯ ==========
var canvas, stage, exportRoot, anim_container, dom_overlay_container, fnStartAnimation;

// Текущая активная анимация
var currentAnimId = null;
var compositions = {};

async function init() {
	canvas = document.getElementById("canvas");
	anim_container = document.getElementById("animation_container");
	dom_overlay_container = document.getElementById("dom_overlay_container");
	
	// Сохраняем все композиции
	compositions = {
		1: AdobeAn.getComposition("C2FF4C35834A4122BCF87252FB971D31"), // Анимация 
	};
	
	// По умолчанию загружаем анимацию 3
	loadAnimation(1);



	
}

async function loadAnimation(animId) {
	if (currentAnimId === animId) return;
	
	console.log('🔄 Загрузка анимации ' + animId);
	
	// Очищаем сцену
	if (stage) {
		stage.removeAllChildren();
		createjs.Ticker.removeAllEventListeners('tick');
	}
	
	var comp = compositions[animId];
	if (!comp) {
		console.error('❌ Композиция для анимации ' + animId + ' не найдена');
		return;
	}
	
	var lib = comp.getLibrary();
	var loader = new createjs.LoadQueue(false);
	loader.addEventListener("fileload", function(evt) { handleFileLoad(evt, comp, animId); });
	loader.addEventListener("complete", function(evt) { handleComplete(evt, comp, animId); });
	loader.loadManifest(lib.properties.manifest);
}

function handleFileLoad(evt, comp, animId) {
	var images = comp.getImages();
	if (evt && (evt.item.type == "image")) {
		images[evt.item.id] = evt.result;
	}
}

function handleComplete(evt, comp, animId) {
	var lib = comp.getLibrary();
	var ss = comp.getSpriteSheet();
	var queue = evt.target;
	var ssMetadata = lib.ssMetadata;
	
	for (var i = 0; i < ssMetadata.length; i++) {
		ss[ssMetadata[i].name] = new createjs.SpriteSheet({
			"images": [queue.getResult(ssMetadata[i].name)],
			"frames": ssMetadata[i].frames
		});
	}
	
	exportRoot = new lib.index();
	stage = new lib.Stage(canvas);
	stage.enableMouseOver();
	
	fnStartAnimation = function() {
		stage.addChild(exportRoot);
		createjs.Ticker.framerate = lib.properties.fps;
		createjs.Ticker.addEventListener("tick", stage);
	};
	
	AdobeAn.makeResponsive(false, 'both', false, 1, [canvas, anim_container, dom_overlay_container]);
	AdobeAn.compositionLoaded(lib.properties.id);
	fnStartAnimation();
	
	currentAnimId = animId;
	
	// Инициализируем менеджер анимаций
	if (window.animationManager) {
		window.animationManager.onAnimationLoaded(animId);
	}
	
	console.log('✅ Анимация ' + animId + ' загружена');

	window.animationManager = new AnimationManager();
	window.animationManager.init();

	window.animationManager.startAnimation(1);

}
</script>

<script>
// ========== КЛАСС УПРАВЛЕНИЯ АНИМАЦИЯМИ ==========

class AnimationManager {
	constructor() {
		// Конфигурации анимаций
		this.animations = {
			1: {
				id: 1,
				name: 'Анимация 1',
				hasTrajectory: false,
				hasPowerScale: false,
				// Анимация 1: кнопки на кадре 31, нет шкалы силы
				frameFlow: {
					introEnd: 7,      // Кадр проверки act1
					buttonsShow: 31,  // Кадр с кнопками выбора
					resultCheck: 33   // Кадр проверки результата
				},
				videos: {
					intro: '1_v1_1',
					results: {
						'1': '1_v2',    // btn1 -> 1_v2
						'2': '1_v3',    // btn2 -> 1_v3
						'3': '1_v4'     // btn3 -> 1_v4
					},
					// Дополнительные видео для разных poz
					resultsExtended: {
						'1_1': '1_v2',
						'1_2': '1_v2_1',
						'2_1': '1_v3',
						'2_2': '1_v3_1',
						'3_1': '1_v4',
						'3_2': '1_v4_1'
					}
				}
			},
			
		};
		
		this.currentAnimationId = null;
		this.currentConfig = null;
		
		this.GAME_STATE = {
			IDLE: 'idle',
			INTRO: 'intro',
			TRAJECTORY: 'trajectory',
			POWER: 'power',
			RESULT: 'result'
		};
		this.gameState = this.GAME_STATE.IDLE;
		
		// Глобальные переменные
		window.act1 = 0;
		window.act2 = 0;
		window.act3 = 0;
		window.act4 = 0;
		window.tr = 1;
		window.poz = 1;
		
		// Для рисования траектории
		this.drawCanvas = null;
		this.drawCtx = null;
		this.isDrawing = false;
		this.drawPoints = [];
		this.drawingEnabled = false;
		this.cx = 0; this.cy = 0; this.H = 0; this.W = 0;
		this.canvasWidth = 0; this.canvasHeight = 0;
		this.zoneBoundaries = { leftThird: 0, rightThird: 0 };
		
		// this.createUI();
		this.bindEvents();
		this.setupGlobalVideoFunctions();
	}

	bindEvents() {
		window.addEventListener('resize', () => {
			this.resizeContainer();
			if (this.drawingEnabled) this.updateDrawGeometry();
		});
	}
	
	// ========== ГЛОБАЛЬНЫЕ ВИДЕО-ФУНКЦИИ ==========
	
	setupGlobalVideoFunctions() {
		var self = this;
		
		// Анимация 1
		window.vShow1_v1_1 = function() { self.playVideoById('1_v1_1'); };
		window.vShow1_v2   = function() { self.playVideoById('1_v2');   };
		window.vShow1_v2_1 = function() { self.playVideoById('1_v2_1'); };
		window.vShow1_v3   = function() { self.playVideoById('1_v3');   };
		window.vShow1_v3_1 = function() { self.playVideoById('1_v3_1'); };
		window.vShow1_v4   = function() { self.playVideoById('1_v4');   };
		window.vShow1_v4_1 = function() { self.playVideoById('1_v4_1'); };
		
		// Анимация 2
		window.vShow2_v1 = function() { self.playVideoById('2_v1'); };
		window.vShow2_v2 = function() { self.playVideoById('2_v2'); };
		window.vShow2_v3 = function() { self.playVideoById('2_v3'); };
		window.vShow2_v4 = function() { self.playVideoById('2_v4'); };
		
		// Анимация 3
		window.vShow3_v1   = function() { self.playVideoById('3_v1');   };
		window.vShow3_v2_1 = function() { self.playVideoById('3_v2_1'); };
		window.vShow3_v2_2 = function() { self.playVideoById('3_v2_2'); };
		window.vShow3_v3_1 = function() { self.playVideoById('3_v3_1'); };
		window.vShow3_v3_2 = function() { self.playVideoById('3_v3_2'); };
		window.vShow3_v3_3 = function() { self.playVideoById('3_v3_3'); };
		window.vShow3_v4_1 = function() { self.playVideoById('3_v4_1'); };
		window.vShow3_v4_2 = function() { self.playVideoById('3_v4_2'); };
		window.vShow3_v4_3 = function() { self.playVideoById('3_v4_3'); };
		
		// Старые имена для обратной совместимости с Adobe Animate
		window.vShow1 = function() {
			self.playVideoById(self.currentConfig ? self.currentConfig.videos.intro : '3_v1');
		};
		window.vShow2 = function() { self.playVideoById(self.getResultVideoId('1')); };
		window.vShow3 = function() { self.playVideoById(self.getResultVideoId('2')); };
		window.vShow4 = function() { self.playVideoById(self.getResultVideoId('3')); };
		window.vShow2_1 = function() { self.playVideoById('3_v2_1'); };
		window.vShow2_2 = function() { self.playVideoById('3_v2_2'); };
		window.vShow3_1 = function() { self.playVideoById('3_v3_1'); };
		window.vShow3_2 = function() { self.playVideoById('3_v3_2'); };
		window.vShow3_3 = function() { self.playVideoById('3_v3_3'); };
		window.vShow4_1 = function() { self.playVideoById('3_v4_1'); };
		window.vShow4_2 = function() { self.playVideoById('3_v4_2'); };
		window.vShow4_3 = function() { self.playVideoById('3_v4_3'); };
	}
	
	getResultVideoId(trajectoryKey) {
		if (!this.currentConfig) return '3_v2_1';
		
		var results = this.currentConfig.videos.results;
		var poz = window.poz || 1;
		var key = trajectoryKey;
		
		// Для анимации 3 используем tr_poz формат
		if (this.currentAnimationId === 3) {
			key = trajectoryKey + '_' + poz;
		}
		
		// Для анимации 1 используем расширенные результаты
		if (this.currentAnimationId === 1 && results[trajectoryKey + '_' + poz]) {
			key = trajectoryKey + '_' + poz;
		}
		
		return results[key] || results[trajectoryKey] || '3_v2_1';
	}
	
	playVideoById(videoId) {
		if (!videoId) return;
		this.hideAllVideos();
		this.showVideo(videoId);
		this.playVideo(videoId);
		console.log('▶ Воспроизведение: ' + videoId);
	}
	
	// ========== ИНИЦИАЛИЗАЦИЯ ==========
	
	init() {
		console.log('🔧 AnimationManager инициализирован');
		this.initDrawCanvas();
		this.resizeContainer();
		this.setupVideoEndHandlers();
		
		var mainCanvas = document.getElementById('canvas');
		if (mainCanvas) {
			mainCanvas.addEventListener('click', (e) => this.handleCanvasClick(e));
		}
		
		console.log('✅ Доступные анимации:');
		for (var id in this.animations) {
			console.log('  ' + id + ': ' + this.animations[id].name + 
				(this.animations[id].hasTrajectory ? ' (с траекторией)' : '') +
				(this.animations[id].hasPowerScale ? ' (со шкалой силы)' : ''));
		}
	}
	
	onAnimationLoaded(animId) {
		console.log('📦 Анимация ' + animId + ' загружена в контейнер');
		if (exportRoot) {
			exportRoot.gotoAndStop(0);
		}
	}
	
	// ========== ЗАПУСК АНИМАЦИИ ==========
	
	startAnimation(animationId) {
		animationId = parseInt(animationId);
		
		if (!this.animations[animationId]) {
			console.error('❌ Анимация с ID ' + animationId + ' не найдена');
			return;
		}
		
		console.log('🚀 Запуск анимации ' + animationId + ': ' + this.animations[animationId].name);
		
		this.resetGame();
		
		this.currentAnimationId = animationId;
		this.currentConfig = this.animations[animationId];
		
		this.highlightActiveButton();
		
		// Загружаем нужную анимацию
		if (typeof loadAnimation === 'function') {
			loadAnimation(animationId);
		}
		
		// Сбрасываем переменные
		window.act1 = 0;
		window.act2 = 0;
		window.act3 = 0;
		window.act4 = 0;
		window.tr = 1;
		window.poz = 1;
		
		this.gameState = this.GAME_STATE.INTRO;
		
		// Даём время на загрузку, затем запускаем
		setTimeout(() => {
			if (exportRoot) {
				exportRoot.play();
			}
			this.showIntroVideo();
		}, 100);
		
		console.log('✅ Анимация ' + animationId + ' запущена');
	}
	
	highlightActiveButton() {
		var buttons = document.querySelectorAll('#animationButtons button');
		buttons.forEach((button) => {
			var buttonAnimId = parseInt(button.dataset.animationId);
			if (buttonAnimId === this.currentAnimationId) {
				button.style.background = '#FDBA01';
				button.style.color = '#000';
			} else {
				button.style.background = 'rgba(0, 0, 0, 0.7)';
				button.style.color = '#FDBA01';
			}
		});
	}
	
	// ========== ОБРАБОТЧИК КЛИКОВ ==========
	
	handleCanvasClick(e) {
		console.log('🖱 Клик по canvas, состояние: ' + this.gameState);
		
		if (this.gameState === this.GAME_STATE.IDLE) {
			this.startAnimation(3);
		} else if (this.gameState === this.GAME_STATE.POWER) {
			this.selectPower();
		} else if (this.gameState === this.GAME_STATE.RESULT) {
			this.resetGame();
		}
	}
	
	// ========== УПРАВЛЕНИЕ ВИДЕО ==========
	
	hideAllVideos() {
		document.querySelectorAll('.video-block').forEach(function(block) {
			block.classList.remove('show');
			block.style.display = 'none';
			var video = block.querySelector('video');
			if (video) {
				video.pause();
				video.currentTime = 0;
			}
		});
	}
	
	showVideo(blockId) {
		var block = document.getElementById(blockId);
		if (!block) return;
		block.style.display = 'block';
		block.classList.add('show');
	}
	
	playVideo(blockId) {
		var block = document.getElementById(blockId);
		if (!block) return;
		var video = block.querySelector('video');
		if (!video) return;
		video.currentTime = 0;
		video.play().catch(function(e) {
			console.log('Ошибка воспроизведения ' + blockId + ':', e);
		});
	}
	
	showIntroVideo() {
		this.hideAllVideos();
		if (this.currentConfig && this.currentConfig.videos.intro) {
			this.playVideoById(this.currentConfig.videos.intro);
		}
	}
	
	// ========== ИГРОВАЯ ЛОГИКА ==========
	
	selectPower() {
		if (this.gameState !== this.GAME_STATE.POWER) return;
		
		console.log('⚡ Фиксация силы: ' + window.poz);
		
		if (exportRoot && exportRoot.instance_1) {
			exportRoot.instance_1.stop();
		}
		
		this.gameState = this.GAME_STATE.RESULT;
		
		var videoId = this.getResultVideoId(String(window.tr || 1));
		this.playVideoById(videoId);
		
		if (exportRoot) exportRoot.play();
	}


	dispatchMechanicEnd(success) {
		// Создаем кастомное событие с данными
		const event = new CustomEvent('mechanicEnd', {
			detail: {
				success: success,
				timestamp: Date.now()
			}
		});
		
		// Отправляем событие в родительское окно
		if (window.parent && window.parent !== window) {
			window.parent.document.dispatchEvent(event);
			console.log('📤 Событие mechanicEnd отправлено в родительское окно. success:', success);
		} else {
			console.warn('⚠ Родительское окно не найдено');
		}
	}
	
	resetGame() {
		console.log('🔄 Сброс игры');
		this.disableDrawing();
		this.hideAllVideos();
		
		if (exportRoot) exportRoot.gotoAndStop(0);
		
		window.act1 = 0;
		window.act2 = 0;
		window.act3 = 0;
		window.act4 = 0;
		window.tr = 1;
		window.poz = 1;
		this.gameState = this.GAME_STATE.IDLE;
		this.currentAnimationId = null;
		this.currentConfig = null;
		
		var buttons = document.querySelectorAll('#animationButtons button');
		buttons.forEach(function(button) {
			button.style.background = 'rgba(0, 0, 0, 0.7)';
			button.style.color = '#FDBA01';
		});
		
		console.log('✅ Игра сброшена');
	}
	
	// ========== РИСОВАНИЕ ТРАЕКТОРИИ ==========
	
	initDrawCanvas() {
		this.drawCanvas = document.createElement('canvas');
		this.drawCanvas.style.cssText = `
			position: absolute; top: 0; left: 0;
			width: 100%; height: 100%;
			z-index: 1000; pointer-events: auto; display: none;
		`;
		this.drawCanvas.id = 'drawCanvas';
		
		var container = document.getElementById('animation_container');
		if (container) container.appendChild(this.drawCanvas);
		
		this.drawCtx = this.drawCanvas.getContext('2d');
		
		this.drawCanvas.addEventListener('mousedown', (e) => this.handleDrawMouseDown(e));
		this.drawCanvas.addEventListener('touchstart', (e) => this.handleDrawTouchStart(e), { passive: false });
		window.addEventListener('mousemove', (e) => this.handleDrawMouseMove(e));
		window.addEventListener('touchmove', (e) => this.handleDrawTouchMove(e), { passive: false });
		window.addEventListener('mouseup', (e) => this.handleDrawMouseUp(e));
		window.addEventListener('touchend', (e) => this.handleDrawTouchEnd(e));
	}
	
	updateDrawGeometry() {
		if (!this.drawCanvas) return;
		var container = document.getElementById('animation_container');
		if (!container) return;
		
		this.canvasWidth = container.offsetWidth;
		this.canvasHeight = container.offsetHeight;
		this.drawCanvas.width = this.canvasWidth;
		this.drawCanvas.height = this.canvasHeight;
		
		this.cx = this.canvasWidth / 2;
		this.cy = this.canvasHeight * 0.55;
		
		if (this.currentConfig && this.currentConfig.triangle) {
			var tri = this.currentConfig.triangle;
			var BASE_RATIO = 2 * Math.tan(tri.apexAngle / 2);
			this.H = Math.min(this.canvasWidth, this.canvasHeight) * tri.heightRatio;
			this.W = this.H * BASE_RATIO;
			this.zoneBoundaries.leftThird = -this.W/2 + this.W * tri.zoneProportions.left;
			this.zoneBoundaries.rightThird = this.zoneBoundaries.leftThird + this.W * tri.zoneProportions.center;
		}
		this.redrawTriangle();
	}
	
	worldToLocal(wx, wy) {
		var rotation = (this.currentConfig && this.currentConfig.triangle) ? this.currentConfig.triangle.rotation : Math.PI / 6;
		var dx = wx - this.cx;
		var dy = wy - this.cy;
		var cos = Math.cos(-rotation);
		var sin = Math.sin(-rotation);
		return { x: dx * cos - dy * sin, y: dx * sin + dy * cos };
	}
	
	isInsideTriangle(localX, localY) {
		if (localY < -this.H/2 || localY > this.H/2) return false;
		var t = (localY + this.H/2) / this.H;
		var halfWidth = (this.W / 2) * (1 - t);
		return Math.abs(localX) <= halfWidth;
	}
	
	getZone(localX, localY) {
		if (localX <= this.zoneBoundaries.leftThird) return 'Лево';
		if (localX <= this.zoneBoundaries.rightThird) return 'Центр';
		return 'Право';
	}
	
	zoneToNumber(zone) {
		if (zone === 'Лево') return 1;
		if (zone === 'Центр') return 2;
		if (zone === 'Право') return 3;
		return 1;
	}
	
	redrawTriangle() {
		if (!this.drawCtx) return;
		this.drawCtx.clearRect(0, 0, this.canvasWidth, this.canvasHeight);
		this.drawTrajectoryPath();
	}
	
	drawTrajectoryPath() {
		if (!this.drawCtx || this.drawPoints.length < 2) return;
		
		this.drawCtx.save();
		this.drawCtx.beginPath();
		this.drawCtx.moveTo(this.drawPoints[0].x, this.drawPoints[0].y);
		for (var i = 1; i < this.drawPoints.length; i++) {
			this.drawCtx.lineTo(this.drawPoints[i].x, this.drawPoints[i].y);
		}
		this.drawCtx.strokeStyle = '#FDBA01';
		this.drawCtx.lineWidth = Math.max(3, this.W * 0.015);
		this.drawCtx.lineCap = 'round';
		this.drawCtx.lineJoin = 'round';
		this.drawCtx.shadowColor = '#FDBA01';
		this.drawCtx.shadowBlur = 10;
		this.drawCtx.stroke();
		
		if (this.drawPoints.length > 0) {
			var lastPoint = this.drawPoints[this.drawPoints.length - 1];
			this.drawCtx.beginPath();
			this.drawCtx.arc(lastPoint.x, lastPoint.y, Math.max(6, this.W * 0.025), 0, Math.PI * 2);
			this.drawCtx.fillStyle = '#FFFFFF';
			this.drawCtx.fill();
			this.drawCtx.strokeStyle = '#FDBA01';
			this.drawCtx.lineWidth = 3;
			this.drawCtx.stroke();
		}
		this.drawCtx.restore();
	}
	
	enableDrawing() {
		if (!this.drawCanvas) this.initDrawCanvas();
		this.drawingEnabled = true;
		this.drawCanvas.style.display = 'block';
		this.drawPoints = [];
		this.updateDrawGeometry();
	}
	
	disableDrawing() {
		this.drawingEnabled = false;
		this.isDrawing = false;
		this.drawPoints = [];
		if (this.drawCanvas) {
			this.drawCanvas.style.display = 'none';
			if (this.drawCtx) this.drawCtx.clearRect(0, 0, this.canvasWidth, this.canvasHeight);
		}
	}
	
	// Обработчики мыши/touch
	handleDrawMouseDown(e) {
		if (!this.drawingEnabled || this.gameState !== this.GAME_STATE.TRAJECTORY) return;
		if (e.button !== 0) return;
		e.preventDefault(); e.stopPropagation();
		this.startDrawing(e.clientX, e.clientY);
	}
	handleDrawMouseMove(e) {
		if (!this.isDrawing || !this.drawingEnabled) return;
		e.preventDefault();
		this.continueDrawing(e.clientX, e.clientY);
	}
	handleDrawMouseUp(e) {
		if (!this.isDrawing || !this.drawingEnabled) return;
		e.preventDefault();
		this.endDrawing();
	}
	handleDrawTouchStart(e) {
		if (!this.drawingEnabled || this.gameState !== this.GAME_STATE.TRAJECTORY) return;
		e.preventDefault(); e.stopPropagation();
		this.startDrawing(e.touches[0].clientX, e.touches[0].clientY);
	}
	handleDrawTouchMove(e) {
		if (!this.isDrawing || !this.drawingEnabled) return;
		e.preventDefault();
		this.continueDrawing(e.touches[0].clientX, e.touches[0].clientY);
	}
	handleDrawTouchEnd(e) {
		if (!this.isDrawing || !this.drawingEnabled) return;
		e.preventDefault();
		this.endDrawing();
	}
	
	startDrawing(clientX, clientY) {
		var rect = this.drawCanvas.getBoundingClientRect();
		var mx = clientX - rect.left;
		var my = clientY - rect.top;
		var local = this.worldToLocal(mx, my);
		if (this.isInsideTriangle(local.x, local.y)) {
			this.isDrawing = true;
			this.drawPoints = [{ x: mx, y: my }];
			this.redrawTriangle();
		}
	}
	continueDrawing(clientX, clientY) {
		var rect = this.drawCanvas.getBoundingClientRect();
		var mx = clientX - rect.left;
		var my = clientY - rect.top;
		var local = this.worldToLocal(mx, my);
		if (this.isInsideTriangle(local.x, local.y)) {
			this.drawPoints.push({ x: mx, y: my });
			this.redrawTriangle();
		}
	}
	endDrawing() {
		this.isDrawing = false;
		if (this.drawPoints.length > 1 && this.gameState === this.GAME_STATE.TRAJECTORY) {
			var lastPoint = this.drawPoints[this.drawPoints.length - 1];
			var local = this.worldToLocal(lastPoint.x, lastPoint.y);
			var zone = this.getZone(local.x, local.y);
			var trajectoryNumber = this.zoneToNumber(zone);
			console.log('🎯 Траектория: ' + zone + ' (' + trajectoryNumber + ')');
			window.tr = trajectoryNumber;
			this.gameState = this.GAME_STATE.POWER;
			this.disableDrawing();
			if (exportRoot) exportRoot.play();
		}
	}
	
	// ========== ОБРАБОТЧИКИ ВИДЕО ==========
	
	setupVideoEndHandlers() {
		var allVideoIds = [];
		for (var animId in this.animations) {
			var config = this.animations[animId];
			if (config.videos.intro) allVideoIds.push(config.videos.intro);
			for (var key in config.videos.results) {
				allVideoIds.push(config.videos.results[key]);
			}
			if (config.videos.resultsExtended) {
				for (var key in config.videos.resultsExtended) {
					allVideoIds.push(config.videos.resultsExtended[key]);
				}
			}
		}
		allVideoIds = allVideoIds.filter((v, i, a) => a.indexOf(v) === i);
		
		allVideoIds.forEach((videoId) => {
			var block = document.getElementById(videoId);
			if (!block) return;
			var video = block.querySelector('video');
			if (!video) return;
			video.addEventListener('ended', () => {
				video.pause();
				console.log('🏁 Видео закончилось: ' + videoId);
				// Устанавливаем act флаги для анимации 1
				if (videoId === '1_v1_1') window.act1 = 1;
				if ( videoId === '1_v2_1') window.act2 = 1;
				if ( videoId === '1_v3_1') window.act3 = 1;
				if ( videoId === '1_v4_1') window.act4 = 1;

				if(videoId == '1_v4') {
					setTimeout(() => {
						this.dispatchMechanicEnd(true);
					}, 100)
				} else if(videoId !== '1_v1_1') {
					setTimeout(() => {
						this.dispatchMechanicEnd(false);
					}, 100)
				}
			});
		});
	}
	
	// ========== АДАПТИВНОСТЬ ==========
	
	resizeContainer() {
		var container = document.getElementById('animation_container');
		if (!container) return;
		var windowWidth = window.innerWidth;
		var windowHeight = window.innerHeight;
		var aspectRatio = 850 / 480;
		var newWidth, newHeight;
		if (windowWidth / windowHeight > aspectRatio) {
			newHeight = windowHeight;
			newWidth = newHeight * aspectRatio;
		} else {
			newWidth = windowWidth;
			newHeight = newWidth / aspectRatio;
		}
		container.style.width = newWidth + 'px';
		container.style.height = newHeight + 'px';
		if (this.drawCanvas && this.drawingEnabled) this.updateDrawGeometry();
	}
}

// ========== СОЗДАНИЕ ЭКЗЕМПЛЯРА ==========
window.addEventListener('load', () => {
	init();
});

</script>
