<script src="index.js?1782131025516"></script>
<script>
// ========== РЕГИСТРАЦИЯ КОМПОЗИЦИЙ ==========
// Композиции должны быть зарегистрированы до вызова init()
// Они уже зарегистрированы в index.js, но дублируем для надёжности

var canvas, stage, exportRoot, anim_container, dom_overlay_container, fnStartAnimation;
var currentCompId = 'C2FF4C35834A4122BCF87252FB971D31';
var isCompositionLoaded = false;

function init() {
	console.log('🔧 init() вызван');
	
	canvas = document.getElementById("canvas");
	anim_container = document.getElementById("animation_container");
	dom_overlay_container = document.getElementById("dom_overlay_container");
	
	// Проверяем, что AdobeAn определён
	if (typeof AdobeAn === 'undefined') {
		console.error('❌ AdobeAn не определён!');
		return;
	}
	
	// Проверяем, что композиции зарегистрированы
	var comp = AdobeAn.getComposition(currentCompId);
	if (!comp) {
		console.warn('⚠️ Композиция не найдена, повторная регистрация...');
		// Пробуем зарегистрировать композиции из глобального объекта
		if (typeof window.anCompositions !== 'undefined') {
			for (var id in window.anCompositions) {
				AdobeAn.compositions[id] = window.anCompositions[id];
			}
		}
		comp = AdobeAn.getComposition(currentCompId);
	}
	
	if (!comp) {
		console.error('❌ Композиция ' + currentCompId + ' не найдена!');
		return;
	}
	
	loadComposition(currentCompId);
}

function loadComposition(compId) {
	console.log('📂 Загрузка композиции:', compId);
	currentCompId = compId;
	
	var comp = AdobeAn.getComposition(compId);
	if (!comp) {
		console.error('❌ Композиция не найдена:', compId);
		return;
	}
	
	var lib = comp.getLibrary();
	var loader = new createjs.LoadQueue(false);
	loader.addEventListener("fileload", function(evt){ handleFileLoad(evt, comp); });
	loader.addEventListener("complete", function(evt){ handleComplete(evt, comp); });
	loader.loadManifest(lib.properties.manifest);
}

function handleFileLoad(evt, comp) {
	var images = comp.getImages();	
	if (evt && (evt.item.type == "image")) { images[evt.item.id] = evt.result; }	
}

function handleComplete(evt, comp) {
	console.log('✅ Композиция загружена');
	
	var lib = comp.getLibrary();
	var ss = comp.getSpriteSheet();
	var queue = evt.target;
	var ssMetadata = lib.ssMetadata;
	for (i = 0; i < ssMetadata.length; i++) {
		ss[ssMetadata[i].name] = new createjs.SpriteSheet({
			"images": [queue.getResult(ssMetadata[i].name)],
			"frames": ssMetadata[i].frames
		});
	}
	
	var compId = comp.getLibrary().properties.id;
	console.log('📦 ID композиции:', compId);
	
	if (compId === 'ANIMATION_1_COMP_ID') {
		exportRoot = new lib.index_1();
	} else if (compId === 'ANIMATION_2_COMP_ID') {
		exportRoot = new lib.index_2();
	} else {
		exportRoot = new lib.index();
	}
	
	stage = new lib.Stage(canvas);
	stage.enableMouseOver();
	
	fnStartAnimation = function() {
		stage.addChild(exportRoot);
		createjs.Ticker.framerate = lib.properties.fps;
		createjs.Ticker.addEventListener("tick", stage);
	};
	
	AdobeAn.makeResponsive(false, 'both', false, 1, [canvas, anim_container, dom_overlay_container]);
	AdobeAn.compositionLoaded(lib.properties.id);
	fnStartAnimation();
	
	if (window.animationManager) {
		window.animationManager.init(currentCompId);
	}
}
</script>

<script>
// ========== КЛАСС УПРАВЛЕНИЯ АНИМАЦИЯМИ ==========

class AnimationManager {
	constructor() {
		// Конфигурации анимаций с новыми названиями видео
		this.animations = {
			// Анимация 1 - на основе index_1.html
			1: {
				id: 1,
				name: 'Анимация 1',
				compId: 'ANIMATION_1_COMP_ID',
				hasTrajectory: false,
				videos: {
					intro: '1_v1_1',
					results: {
						'1_1': '1_v2',
						'1_2': '1_v2_1',
						'1_3': '1_v2_1',
						'2_1': '1_v3',
						'2_2': '1_v3_1',
						'2_3': '1_v3_1',
						'3_1': '1_v4',
						'3_2': '1_v4_1',
						'3_3': '1_v4_1'
					}
				}
			},
			// Анимация 2 - на основе index_2.html
			2: {
				id: 2,
				name: 'Анимация 2',
				compId: 'ANIMATION_2_COMP_ID',
				hasTrajectory: false,
				videos: {
					intro: '2_v1',
					results: {
						'1_1': '2_v2',
						'1_2': '2_v2',
						'1_3': '2_v2',
						'2_1': '2_v3',
						'2_2': '2_v3',
						'2_3': '2_v3',
						'3_1': '2_v4',
						'3_2': '2_v4',
						'3_3': '2_v4'
					}
				}
			},
			// Анимация 3 - существующая (с траекторией)
			3: {
				id: 3,
				name: 'Анимация 3',
				compId: 'C2FF4C35834A4122BCF87252FB971D31',
				hasTrajectory: true,
				videos: {
					intro: '3_v1',
					results: {
						'1_1': '3_v2_1',
						'1_2': '3_v2_2',
						'1_3': '3_v2_2',
						'2_1': '3_v3_1',
						'2_2': '3_v3_2',
						'2_3': '3_v3_3',
						'3_1': '3_v4_1',
						'3_2': '3_v4_2',
						'3_3': '3_v4_3'
					}
				},
				triangle: {
					rotation: Math.PI / 5,
					heightRatio: 1,
					apexAngle: 100 * Math.PI / 180,
					zoneProportions: {
						left: 0.45,
						center: 0.25,
						right: 0.30
					}
				}
			}
		};
		
		this.currentAnimationId = null;
		this.currentConfig = null;
		this.currentCompId = null;
		
		this.GAME_STATE = {
			IDLE: 'idle',
			INTRO: 'intro',
			TRAJECTORY: 'trajectory',
			POWER: 'power',
			RESULT: 'result'
		};
		this.gameState = this.GAME_STATE.IDLE;
		
		window.act1 = 0;
		window.tr = 1;
		window.poz = 1;
		
		this.trajectoryTimer = null;
		this.trajectoryTimeLeft = 5;
		this.trajectorySelected = false;
		
		this.drawCanvas = null;
		this.drawCtx = null;
		this.isDrawing = false;
		this.drawPoints = [];
		this.drawingEnabled = false;
		
		this.cx = 0;
		this.cy = 0;
		this.H = 0;
		this.W = 0;
		this.canvasWidth = 0;
		this.canvasHeight = 0;
		this.zoneBoundaries = { leftThird: 0, rightThird: 0 };
		
		this.videoEndFlags = {};
		
		this.createUI();
		this.bindEvents();
	}
	
	// ========== СОЗДАНИЕ UI ==========
	
	createUI() {
		var buttonContainer = document.createElement('div');
		buttonContainer.id = 'animationButtons';
		buttonContainer.style.cssText = `
			position: fixed;
			bottom: 20px;
			left: 50%;
			transform: translateX(-50%);
			display: flex;
			gap: 10px;
			z-index: 10000;
			flex-wrap: wrap;
			justify-content: center;
			padding: 0 10px;
		`;
		
		for (var id in this.animations) {
			var config = this.animations[id];
			var button = document.createElement('button');
			button.textContent = config.name;
			button.dataset.animationId = id;
			button.style.cssText = `
				padding: 12px 24px;
				font-size: 16px;
				font-weight: bold;
				border: 2px solid #FDBA01;
				background: rgba(0, 0, 0, 0.7);
				color: #FDBA01;
				border-radius: 8px;
				cursor: pointer;
				transition: all 0.3s;
				min-width: 140px;
			`;
			
			button.addEventListener('mouseenter', function() {
				this.style.background = '#FDBA01';
				this.style.color = '#000';
			});
			
			button.addEventListener('mouseleave', function() {
				if (window.animationManager.currentAnimationId != this.dataset.animationId) {
					this.style.background = 'rgba(0, 0, 0, 0.7)';
					this.style.color = '#FDBA01';
				}
			});
			
			button.addEventListener('click', (function(animId) {
				return function() {
					window.animationManager.startAnimation(animId);
				};
			})(id));
			
			buttonContainer.appendChild(button);
		}
		
		document.body.appendChild(buttonContainer);
	}
	
	// ========== ПРИВЯЗКА СОБЫТИЙ ==========
	
	bindEvents() {
		window.addEventListener('resize', () => {
			this.resizeContainer();
			if (this.drawingEnabled) {
				this.updateDrawGeometry();
			}
		});
	}
	
	// ========== ИНИЦИАЛИЗАЦИЯ ==========
	
	init(compId) {
		console.log('🔧 AnimationManager инициализирован');
		this.currentCompId = compId || 'C2FF4C35834A4122BCF87252FB971D31';
		this.initDrawCanvas();
		this.resizeContainer();
		this.setupVideoEndHandlers();
		this.setupFrameTracking();
		
		if (exportRoot) {
			exportRoot.gotoAndStop(0);
		}
		
		var mainCanvas = document.getElementById('canvas');
		if (mainCanvas) {
			mainCanvas.addEventListener('click', (e) => {
				this.handleCanvasClick(e);
			});
		}
		
		console.log('✅ Доступные анимации:');
		for (var id in this.animations) {
			console.log('  ' + id + ': ' + this.animations[id].name + 
				(this.animations[id].hasTrajectory ? ' (с траекторией)' : ''));
		}
	}
	
	// ========== ЗАГРУЗКА КОМПОЗИЦИИ ==========
	
	loadComposition(compId) {
		console.log('🔄 Загрузка композиции:', compId);
		
		if (compId === this.currentCompId && exportRoot) {
			console.log('✅ Композиция уже загружена');
			return;
		}
		
		if (stage) {
			stage.removeAllChildren();
			stage.update();
		}
		
		this.currentCompId = compId;
		
		// Проверяем, что композиция зарегистрирована
		var comp = AdobeAn.getComposition(compId);
		if (!comp) {
			console.error('❌ Композиция не найдена:', compId);
			console.log('📋 Доступные композиции:', Object.keys(AdobeAn.compositions || {}));
			return;
		}
		
		if (typeof loadComposition === 'function') {
			loadComposition(compId);
		} else {
			console.error('❌ Функция loadComposition не найдена');
		}
	}
	
	// ========== ЗАПУСК АНИМАЦИИ ==========
	
	startAnimation(animationId) {
		animationId = parseInt(animationId);
		
		if (!this.animations[animationId]) {
			console.error('❌ Анимация с ID ' + animationId + ' не найдена');
			return;
		}
		
		console.log('🚀 Запуск анимации ' + animationId + ': ' + this.animations[animationId].name);
		
		this.resetGame();
		
		this.currentAnimationId = animationId;
		this.currentConfig = this.animations[animationId];
		
		this.loadComposition(this.currentConfig.compId);
		this.highlightActiveButton();
		
		window.act1 = 0;
		window.tr = 1;
		window.poz = 1;
		this.trajectorySelected = false;
		
		this.gameState = this.GAME_STATE.INTRO;
		
		setTimeout(() => {
			if (exportRoot) {
				exportRoot.play();
			}
			this.showIntroVideo();
		}, 200);
		
		console.log('✅ Анимация ' + animationId + ' запущена');
	}
	
	highlightActiveButton() {
		var buttons = document.querySelectorAll('#animationButtons button');
		buttons.forEach(function(button) {
			var buttonAnimId = parseInt(button.dataset.animationId);
			if (buttonAnimId === window.animationManager.currentAnimationId) {
				button.style.background = '#FDBA01';
				button.style.color = '#000';
			} else {
				button.style.background = 'rgba(0, 0, 0, 0.7)';
				button.style.color = '#FDBA01';
			}
		});
	}
	
	// ========== ОБРАБОТЧИК КЛИКОВ ==========
	
	handleCanvasClick(e) {
		console.log('🖱 Клик по canvas, состояние: ' + this.gameState);
		
		if (this.gameState === this.GAME_STATE.IDLE) {
			this.startAnimation(3);
		} else if (this.gameState === this.GAME_STATE.POWER) {
			this.selectPower();
		} else if (this.gameState === this.GAME_STATE.RESULT) {
			this.resetGame();
		}
	}
	
	// ========== УПРАВЛЕНИЕ ВИДЕО ==========
	
	hideAllVideos() {
		document.querySelectorAll('.video-block').forEach(function(block) {
			block.classList.remove('show');
			block.style.display = 'none';
			var video = block.querySelector('video');
			if (video) {
				video.pause();
				video.currentTime = 0;
			}
		});
	}
	
	showVideo(blockId) {
		var block = document.getElementById(blockId);
		if (!block) return;
		block.style.display = 'block';
		block.classList.add('show');
	}
	
	playVideo(blockId) {
		var block = document.getElementById(blockId);
		if (!block) return;
		
		var video = block.querySelector('video');
		if (!video) return;
		
		this.videoEndFlags[blockId] = false;
		
		video.currentTime = 0;
		video.play().catch(function(e) {
			console.log('Ошибка воспроизведения ' + blockId + ':', e);
		});
		
		console.log('▶ Воспроизведение: ' + blockId);
	}
	
	showIntroVideo() {
		this.hideAllVideos();
		if (this.currentConfig && this.currentConfig.videos.intro) {
			this.showVideo(this.currentConfig.videos.intro);
			this.playVideo(this.currentConfig.videos.intro);
		}
	}
	
	playResultVideo() {
		var tr = window.tr || 1;
		var poz = window.poz || 1;
		var key = tr + '_' + poz;
		
		console.log('🎯 Определение видео: tr=' + tr + ', poz=' + poz + ', key=' + key);
		
		this.hideAllVideos();
		
		if (this.currentConfig && this.currentConfig.videos.results[key]) {
			var videoId = this.currentConfig.videos.results[key];
			this.showVideo(videoId);
			this.playVideo(videoId);
		} else {
			console.error('❌ Нет видео для key=' + key);
		}
	}
	
	// ========== ФУНКЦИИ ДЛЯ ВЫЗОВА ИЗ ADOBE ANIMATE ==========
	
	getVideoFunctions() {
		var self = this;
		return {
			vShow1: function() { self.showIntroVideo(); },
			vShow2_1: function() { self.hideAllVideos(); self.showVideo('3_v2_1'); self.playVideo('3_v2_1'); },
			vShow2_2: function() { self.hideAllVideos(); self.showVideo('3_v2_2'); self.playVideo('3_v2_2'); },
			vShow3_1: function() { self.hideAllVideos(); self.showVideo('3_v3_1'); self.playVideo('3_v3_1'); },
			vShow3_2: function() { self.hideAllVideos(); self.showVideo('3_v3_2'); self.playVideo('3_v3_2'); },
			vShow3_3: function() { self.hideAllVideos(); self.showVideo('3_v3_3'); self.playVideo('3_v3_3'); },
			vShow4_1: function() { self.hideAllVideos(); self.showVideo('3_v4_1'); self.playVideo('3_v4_1'); },
			vShow4_2: function() { self.hideAllVideos(); self.showVideo('3_v4_2'); self.playVideo('3_v4_2'); },
			vShow4_3: function() { self.hideAllVideos(); self.showVideo('3_v4_3'); self.playVideo('3_v4_3'); }
		};
	}
	
	// ========== РИСОВАНИЕ ТРАЕКТОРИИ ==========
	
	initDrawCanvas() {
		this.drawCanvas = document.createElement('canvas');
		this.drawCanvas.style.cssText = `
			position: absolute;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			z-index: 1000;
			pointer-events: auto;
			display: none;
		`;
		this.drawCanvas.id = 'drawCanvas';
		
		var container = document.getElementById('animation_container');
		if (container) {
			container.appendChild(this.drawCanvas);
		}
		
		this.drawCtx = this.drawCanvas.getContext('2d');
		
		this.drawCanvas.addEventListener('mousedown', (e) => this.handleDrawMouseDown(e));
		this.drawCanvas.addEventListener('touchstart', (e) => this.handleDrawTouchStart(e), { passive: false });
		window.addEventListener('mousemove', (e) => this.handleDrawMouseMove(e));
		window.addEventListener('touchmove', (e) => this.handleDrawTouchMove(e), { passive: false });
		window.addEventListener('mouseup', (e) => this.handleDrawMouseUp(e));
		window.addEventListener('touchend', (e) => this.handleDrawTouchEnd(e));
	}
	
	updateDrawGeometry() {
		if (!this.drawCanvas) return;
		
		var container = document.getElementById('animation_container');
		if (!container) return;
		
		this.canvasWidth = container.offsetWidth;
		this.canvasHeight = container.offsetHeight;
		this.drawCanvas.width = this.canvasWidth;
		this.drawCanvas.height = this.canvasHeight;
		
		this.cx = this.canvasWidth / 2;
		this.cy = this.canvasHeight * 0.55;
		
		if (this.currentConfig && this.currentConfig.triangle) {
			var tri = this.currentConfig.triangle;
			var BASE_RATIO = 2 * Math.tan(tri.apexAngle / 2);
			this.H = Math.min(this.canvasWidth, this.canvasHeight) * tri.heightRatio;
			this.W = this.H * BASE_RATIO;
			
			this.zoneBoundaries.leftThird = -this.W/2 + this.W * tri.zoneProportions.left;
			this.zoneBoundaries.rightThird = this.zoneBoundaries.leftThird + this.W * tri.zoneProportions.center;
		}
		
		this.redrawTriangle();
	}
	
	worldToLocal(wx, wy) {
		var rotation = (this.currentConfig && this.currentConfig.triangle) ? this.currentConfig.triangle.rotation : Math.PI / 6;
		var dx = wx - this.cx;
		var dy = wy - this.cy;
		var cos = Math.cos(-rotation);
		var sin = Math.sin(-rotation);
		return {
			x: dx * cos - dy * sin,
			y: dx * sin + dy * cos
		};
	}
	
	isInsideTriangle(localX, localY) {
		if (localY < -this.H/2 || localY > this.H/2) return false;
		var t = (localY + this.H/2) / this.H;
		var halfWidth = (this.W / 2) * (1 - t);
		return Math.abs(localX) <= halfWidth;
	}
	
	getZone(localX, localY) {
		if (localX <= this.zoneBoundaries.leftThird) return 'Лево';
		if (localX <= this.zoneBoundaries.rightThird) return 'Центр';
		return 'Право';
	}
	
	zoneToNumber(zone) {
		if (zone === 'Лево') return 1;
		if (zone === 'Центр') return 2;
		if (zone === 'Право') return 3;
		return 1;
	}
	
	redrawTriangle() {
		if (!this.drawCtx) return;
		this.drawCtx.clearRect(0, 0, this.canvasWidth, this.canvasHeight);
		this.drawTrajectoryPath();
	}
	
	drawTrajectoryPath() {
		if (!this.drawCtx || this.drawPoints.length < 2) return;
		
		this.drawCtx.save();
		this.drawCtx.beginPath();
		this.drawCtx.moveTo(this.drawPoints[0].x, this.drawPoints[0].y);
		for (var i = 1; i < this.drawPoints.length; i++) {
			this.drawCtx.lineTo(this.drawPoints[i].x, this.drawPoints[i].y);
		}
		this.drawCtx.strokeStyle = '#FDBA01';
		this.drawCtx.lineWidth = Math.max(3, this.W * 0.015);
		this.drawCtx.lineCap = 'round';
		this.drawCtx.lineJoin = 'round';
		this.drawCtx.shadowColor = '#FDBA01';
		this.drawCtx.shadowBlur = 10;
		this.drawCtx.stroke();
		
		if (this.drawPoints.length > 0) {
			var lastPoint = this.drawPoints[this.drawPoints.length - 1];
			var local = this.worldToLocal(lastPoint.x, lastPoint.y);
			var zone = this.getZone(local.x, local.y);
			var glowColor = '#FDBA01';
			if (zone === 'Лево') glowColor = '#FF6464';
			else if (zone === 'Центр') glowColor = '#64FF64';
			else if (zone === 'Право') glowColor = '#6464FF';
			
			this.drawCtx.beginPath();
			this.drawCtx.arc(lastPoint.x, lastPoint.y, Math.max(6, this.W * 0.025), 0, Math.PI * 2);
			this.drawCtx.fillStyle = '#FFFFFF';
			this.drawCtx.fill();
			this.drawCtx.strokeStyle = glowColor;
			this.drawCtx.lineWidth = 3;
			this.drawCtx.shadowColor = glowColor;
			this.drawCtx.shadowBlur = 15;
			this.drawCtx.stroke();
		}
		
		this.drawCtx.restore();
	}
	
	enableDrawing() {
		if (!this.drawCanvas) this.initDrawCanvas();
		
		this.drawingEnabled = true;
		this.drawCanvas.style.display = 'block';
		this.drawPoints = [];
		this.updateDrawGeometry();
		console.log('✏ Рисование траектории включено');
	}
	
	disableDrawing() {
		this.drawingEnabled = false;
		this.isDrawing = false;
		this.drawPoints = [];
		
		if (this.drawCanvas) {
			this.drawCanvas.style.display = 'none';
			if (this.drawCtx) {
				this.drawCtx.clearRect(0, 0, this.canvasWidth, this.canvasHeight);
			}
		}
		
		console.log('✏ Рисование траектории выключено');
	}
	
	handleDrawMouseDown(e) {
		if (!this.drawingEnabled || this.gameState !== this.GAME_STATE.TRAJECTORY) return;
		if (e.button !== 0) return;
		e.preventDefault();
		e.stopPropagation();
		this.startDrawing(e.clientX, e.clientY);
	}
	
	handleDrawMouseMove(e) {
		if (!this.isDrawing || !this.drawingEnabled) return;
		e.preventDefault();
		this.continueDrawing(e.clientX, e.clientY);
	}
	
	handleDrawMouseUp(e) {
		if (!this.isDrawing || !this.drawingEnabled) return;
		e.preventDefault();
		this.endDrawing();
	}
	
	handleDrawTouchStart(e) {
		if (!this.drawingEnabled || this.gameState !== this.GAME_STATE.TRAJECTORY) return;
		e.preventDefault();
		e.stopPropagation();
		var touch = e.touches[0];
		this.startDrawing(touch.clientX, touch.clientY);
	}
	
	handleDrawTouchMove(e) {
		if (!this.isDrawing || !this.drawingEnabled) return;
		e.preventDefault();
		var touch = e.touches[0];
		this.continueDrawing(touch.clientX, touch.clientY);
	}
	
	handleDrawTouchEnd(e) {
		if (!this.isDrawing || !this.drawingEnabled) return;
		e.preventDefault();
		this.endDrawing();
	}
	
	startDrawing(clientX, clientY) {
		var rect = this.drawCanvas.getBoundingClientRect();
		var mx = clientX - rect.left;
		var my = clientY - rect.top;
		var local = this.worldToLocal(mx, my);
		
		if (this.isInsideTriangle(local.x, local.y)) {
			this.isDrawing = true;
			this.drawPoints = [{ x: mx, y: my }];
			this.redrawTriangle();
		}
	}
	
	continueDrawing(clientX, clientY) {
		var rect = this.drawCanvas.getBoundingClientRect();
		var mx = clientX - rect.left;
		var my = clientY - rect.top;
		var local = this.worldToLocal(mx, my);
		
		if (this.isInsideTriangle(local.x, local.y)) {
			this.drawPoints.push({ x: mx, y: my });
			this.redrawTriangle();
		}
	}
	
	endDrawing() {
		this.isDrawing = false;
		
		if (this.drawPoints.length > 1 && this.gameState === this.GAME_STATE.TRAJECTORY) {
			var lastPoint = this.drawPoints[this.drawPoints.length - 1];
			var local = this.worldToLocal(lastPoint.x, lastPoint.y);
			var zone = this.getZone(local.x, local.y);
			var trajectoryNumber = this.zoneToNumber(zone);
			
			console.log('🎯 Траектория нарисована: ' + zone + ' (' + trajectoryNumber + ')');
			
			this.selectTrajectory(trajectoryNumber);
			this.disableDrawing();
		}
	}
	
	// ========== ИГРОВАЯ ЛОГИКА ==========
	
	selectTrajectory(value) {
		if (this.gameState !== this.GAME_STATE.TRAJECTORY) return;
		if (this.trajectorySelected) return;
		
		console.log('🎯 Выбрана траектория: ' + value);
		
		this.trajectorySelected = true;
		window.tr = value;
		
		clearInterval(this.trajectoryTimer);
		this.disableDrawing();
		
		this.gameState = this.GAME_STATE.POWER;
		if (exportRoot) exportRoot.play();
		
		console.log('▶ Переход к выбору силы');
	}
	
	selectPower() {
		if (this.gameState !== this.GAME_STATE.POWER) return;
		
		console.log('⚡ Фиксация силы: ' + window.poz);
		
		if (exportRoot && exportRoot.instance_1) {
			exportRoot.instance_1.stop();
			console.log('🛑 Шкала силы остановлена на poz=' + window.poz);
		}
		
		this.gameState = this.GAME_STATE.RESULT;
		this.playResultVideo();
		if (exportRoot) exportRoot.play();
		
		console.log('▶ Показ результата');
	}
	
	resetGame() {
		console.log('🔄 Сброс игры');
		
		clearInterval(this.trajectoryTimer);
		this.disableDrawing();
		this.hideAllVideos();
		
		if (exportRoot) {
			exportRoot.gotoAndStop(0);
		}
		
		window.act1 = 0;
		window.tr = 1;
		window.poz = 1;
		this.trajectorySelected = false;
		this.gameState = this.GAME_STATE.IDLE;
		this.currentAnimationId = null;
		this.currentConfig = null;
		
		var buttons = document.querySelectorAll('#animationButtons button');
		buttons.forEach(function(button) {
			button.style.background = 'rgba(0, 0, 0, 0.7)';
			button.style.color = '#FDBA01';
		});
		
		console.log('✅ Игра сброшена');
	}
	
	// ========== ОТСЛЕЖИВАНИЕ КАДРОВ ==========
	
	setupFrameTracking() {
		if (!exportRoot) return;
		
		createjs.Ticker.addEventListener('tick', () => {
			if (!exportRoot) return;
			
			var currentFrame = Math.floor(exportRoot.currentFrame);
			
			if (this.currentAnimationId === 3) {
				if (currentFrame === 9 && this.gameState === this.GAME_STATE.INTRO) {
					console.log('⏸ Кадр 9: пауза для траектории');
					
					if (this.currentConfig && this.currentConfig.hasTrajectory) {
						this.gameState = this.GAME_STATE.TRAJECTORY;
						exportRoot.stop();
						this.enableDrawing();
					}
				}
				
				if (currentFrame === 10 && this.gameState === this.GAME_STATE.POWER) {
					console.log('⏸ Кадр 10: пауза для выбора силы');
					exportRoot.stop();
				}
			}
		});
	}
	
	// ========== ОБРАБОТЧИКИ ВИДЕО ==========
	
	setupVideoEndHandlers() {
		var self = this;
		
		var videoIds = [
			'1_v1_1', '1_v2', '1_v2_1', '1_v3', '1_v3_1', '1_v4', '1_v4_1',
			'2_v1', '2_v2', '2_v3', '2_v4',
			'3_v1', '3_v2_1', '3_v2_2', '3_v3_1', '3_v3_2', '3_v3_3', '3_v4_1', '3_v4_2', '3_v4_3'
		];
		
		videoIds.forEach(function(videoId) {
			var block = document.getElementById(videoId);
			if (!block) return;
			
			var video = block.querySelector('video');
			if (!video) return;
			
			video.addEventListener('ended', function() {
				video.pause();
				self.videoEndFlags[videoId] = true;
				console.log('🏁 Событие ended для: ' + videoId);
				
				if (videoId === '1_v1_1' || videoId === '2_v1' || videoId === '3_v1') {
					window.act1 = 1;
				}
			});
		});
	}
	
	// ========== АДАПТИВНОСТЬ ==========
	
	resizeContainer() {
		var container = document.getElementById('animation_container');
		if (!container) return;
		
		var windowWidth = window.innerWidth;
		var windowHeight = window.innerHeight;
		var aspectRatio = 850 / 480;
		
		var newWidth, newHeight;
		
		if (windowWidth / windowHeight > aspectRatio) {
			newHeight = windowHeight;
			newWidth = newHeight * aspectRatio;
		} else {
			newWidth = windowWidth;
			newHeight = newWidth / aspectRatio;
		}
		
		container.style.width = newWidth + 'px';
		container.style.height = newHeight + 'px';
		
		if (this.drawCanvas && this.drawingEnabled) {
			this.updateDrawGeometry();
		}
	}
}
