<script>
var canvas, stage, exportRoot, anim_container, dom_overlay_container, fnStartAnimation;
var currentAnimId = null;
var compositions = {};
var animationInstances = {};

function init() {
	canvas = document.getElementById("canvas");
	anim_container = document.getElementById("animation_container");
	dom_overlay_container = document.getElementById("dom_overlay_container");
	
	compositions = {
		1: AdobeAn.getComposition("C2FF4C35834A4122BCF87252FB971D31"),
		2: AdobeAn.getComposition("C2FF4C35834A4122BCF87252FB971D32"),
		3: AdobeAn.getComposition("C2FF4C35834A4122BCF87252FB971D33")
	};
	
	loadAllAnimations();
}

function loadAllAnimations() {
	var loadedCount = 0;
	var totalAnimations = Object.keys(compositions).length;
	
	for (var animId in compositions) {
		loadAnimation(parseInt(animId), function() {
			loadedCount++;
			if (loadedCount === totalAnimations) {
				console.log('✅ Все анимации загружены');
				if (window.animationManager) {
					window.animationManager.onAllAnimationsLoaded();
				}
				switchToAnimation(3);
			}
		});
	}
}

function loadAnimation(animId, callback) {
	var comp = compositions[animId];
	if (!comp) {
		console.error('❌ Композиция для анимации ' + animId + ' не найдена');
		return;
	}
	
	var lib = comp.getLibrary();
	var loader = new createjs.LoadQueue(false);
	loader.addEventListener("complete", function(evt) {
		handleComplete(evt, comp, animId);
		if (callback) callback();
	});
	loader.loadManifest(lib.properties.manifest);
}

function handleComplete(evt, comp, animId) {
	var lib = comp.getLibrary();
	var ss = comp.getSpriteSheet();
	var queue = evt.target;
	var ssMetadata = lib.ssMetadata;
	
	for (var i = 0; i < ssMetadata.length; i++) {
		ss[ssMetadata[i].name] = new createjs.SpriteSheet({
			"images": [queue.getResult(ssMetadata[i].name)],
			"frames": ssMetadata[i].frames
		});
	}
	
	var root = new lib.index();
	animationInstances[animId] = {
		root: root,
		lib: lib,
		ss: ss
	};
	
	console.log('📦 Анимация ' + animId + ' загружена');
}

function switchToAnimation(animId) {
	if (currentAnimId === animId && stage) return;
	
	console.log('🔄 Переключение на анимацию ' + animId);
	
	if (stage) {
		stage.removeAllChildren();
		createjs.Ticker.removeAllEventListeners('tick');
	}
	
	var instance = animationInstances[animId];
	if (!instance) {
		console.error('❌ Анимация ' + animId + ' не найдена');
		return;
	}
	
	exportRoot = instance.root;
	stage = new instance.lib.Stage(canvas);
	stage.enableMouseOver();
	
	fnStartAnimation = function() {
		stage.addChild(exportRoot);
		createjs.Ticker.framerate = instance.lib.properties.fps;
		createjs.Ticker.addEventListener("tick", stage);
	};
	
	AdobeAn.makeResponsive(false, 'both', false, 1, [canvas, anim_container, dom_overlay_container]);
	fnStartAnimation();
	
	currentAnimId = animId;
	
	// Переопределяем go1 для всех анимаций
	window.go1 = function(context) {
		console.log('▶ go1 вызван для анимации ' + animId);
		if (context) context.play();
		if (window.animationManager) {
			window.animationManager.playIntroVideo();
		}
	};
	
	// Переопределяем go2 только для анимации 2
	if (animId === 2) {
		window.go2 = function(context) {
			console.log('⚡ go2 вызван для анимации 2, poz=' + window.poz);
			if (window.animationManager) {
				window.animationManager.executePowerSelection(context);
			}
		};
	} else {
		delete window.go2; // Удаляем для других анимаций
	}
	
	if (window.animationManager) {
		window.animationManager.onAnimationSwitched(animId);
	}
	
	console.log('✅ Переключено на анимацию ' + animId);
}
</script>

<script>
class AnimationManager {
	constructor() {
		this.animations = {
			1: {
				id: 1,
				name: 'Анимация 1',
				videos: {
					intro: '1_v1_1',
					results: {
						'1': '1_v2', '2': '1_v3', '3': '1_v4'
					}
				}
			},
			2: {
				id: 2,
				name: 'Анимация 2',
				videos: {
					intro: '2_v1',
					results: {
						'1': '2_v2', '2': '2_v3', '3': '2_v4'
					}
				}
			},
			3: {
				id: 3,
				name: 'Анимация 3',
				videos: {
					intro: '3_v1',
					results: {
						'1_1': '3_v2_1', '1_2': '3_v2_2',
						'2_1': '3_v3_1', '2_2': '3_v3_2', '2_3': '3_v3_3',
						'3_1': '3_v4_1', '3_2': '3_v4_2', '3_3': '3_v4_3'
					}
				},
				triangle: {
					rotation: Math.PI / 6,
					heightRatio: 0.7,
					apexAngle: 90 * Math.PI / 180,
					zoneProportions: { left: 0.45, center: 0.20, right: 0.35 }
				}
			}
		};
		
		this.currentAnimationId = null;
		this.currentConfig = null;
		
		this.GAME_STATE = {
			IDLE: 'idle',
			INTRO: 'intro',
			TRAJECTORY: 'trajectory',
			POWER: 'power',
			RESULT: 'result'
		};
		this.gameState = this.GAME_STATE.IDLE;
		
		window.act1 = 0; window.act2 = 0; window.act3 = 0; window.act4 = 0;
		window.tr = 1; window.poz = 1;
		
		this.drawCanvas = null;
		this.drawCtx = null;
		this.isDrawing = false;
		this.drawPoints = [];
		this.drawingEnabled = false;
		this.cx = 0; this.cy = 0; this.H = 0; this.W = 0;
		this.canvasWidth = 0; this.canvasHeight = 0;
		this.zoneBoundaries = { leftThird: 0, rightThird: 0 };
		
		this.lastFrame = -1;
		this.frameCheckInterval = null;
		
		// Флаг для отслеживания, было ли обработано видео intro
		this.introVideoEnded = false;
		
		this.createUI();
		this.bindEvents();
		this.setupGlobalVideoFunctions();
	}
	
	createUI() {
		var buttonContainer = document.createElement('div');
		buttonContainer.id = 'animationButtons';
		buttonContainer.style.cssText = `
			position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
			display: flex; gap: 10px; z-index: 10000;
		`;
		
		for (var id in this.animations) {
			var config = this.animations[id];
			var button = document.createElement('button');
			button.textContent = config.name;
			button.dataset.animationId = id;
			button.style.cssText = `
				padding: 12px 24px; font-size: 16px; font-weight: bold;
				border: 2px solid #FDBA01; background: rgba(0, 0, 0, 0.7);
				color: #FDBA01; border-radius: 8px; cursor: pointer;
				transition: all 0.3s; min-width: 140px;
			`;
			
			button.addEventListener('click', ((animId) => {
				return () => this.startAnimation(animId);
			})(id));
			
			buttonContainer.appendChild(button);
		}
		
		document.body.appendChild(buttonContainer);
	}
	
	bindEvents() {
		window.addEventListener('resize', () => {
			this.resizeContainer();
			if (this.drawingEnabled) this.updateDrawGeometry();
		});
	}
	
	setupGlobalVideoFunctions() {
		var self = this;
		
		window.vShow1_v1_1 = function() { self.playVideoById('1_v1_1'); };
		window.vShow1_v2 = function() { self.playVideoById('1_v2'); };
		window.vShow1_v2_1 = function() { self.playVideoById('1_v2_1'); };
		window.vShow1_v3 = function() { self.playVideoById('1_v3'); };
		window.vShow1_v3_1 = function() { self.playVideoById('1_v3_1'); };
		window.vShow1_v4 = function() { self.playVideoById('1_v4'); };
		window.vShow1_v4_1 = function() { self.playVideoById('1_v4_1'); };
		
		window.vShow2_v1 = function() { self.playVideoById('2_v1'); };
		window.vShow2_v2 = function() { self.playVideoById('2_v2'); };
		window.vShow2_v3 = function() { self.playVideoById('2_v3'); };
		window.vShow2_v4 = function() { self.playVideoById('2_v4'); };
		
		window.vShow3_v1 = function() { self.playVideoById('3_v1'); };
		window.vShow3_v2_1 = function() { self.playVideoById('3_v2_1'); };
		window.vShow3_v2_2 = function() { self.playVideoById('3_v2_2'); };
		window.vShow3_v3_1 = function() { self.playVideoById('3_v3_1'); };
		window.vShow3_v3_2 = function() { self.playVideoById('3_v3_2'); };
		window.vShow3_v3_3 = function() { self.playVideoById('3_v3_3'); };
		window.vShow3_v4_1 = function() { self.playVideoById('3_v4_1'); };
		window.vShow3_v4_2 = function() { self.playVideoById('3_v4_2'); };
		window.vShow3_v4_3 = function() { self.playVideoById('3_v4_3'); };
		
		// Универсальные функции для обратной совместимости
		window.vShow1 = function() { self.playIntroVideo(); };
		window.vShow2 = function() { self.executePowerByNumber(1); };
		window.vShow3 = function() { self.executePowerByNumber(2); };
		window.vShow4 = function() { self.executePowerByNumber(3); };
	}
	
	executePowerByNumber(powerNum) {
		console.log('⚡ Выполнение выбора силы #' + powerNum + ' для анимации ' + this.currentAnimationId);
		
		if (this.currentAnimationId === 2) {
			var videoMap = { 1: '2_v2', 2: '2_v3', 3: '2_v4' };
			this.playVideoById(videoMap[powerNum]);
			this.gameState = this.GAME_STATE.RESULT;
		} else if (this.currentAnimationId === 3) {
			var videoId = '3_v' + (powerNum + 1) + '_' + window.poz;
			this.playVideoById(videoId);
			this.gameState = this.GAME_STATE.RESULT;
		}
		
		if (exportRoot) exportRoot.play();
	}
	
	executePowerSelection(context) {
		console.log('⚡ Выбор силы для анимации 2, poz=' + window.poz);
		
		if (window.poz === 1) {
			this.playVideoById('2_v2');
		} else if (window.poz === 2) {
			this.playVideoById('2_v3');
		} else if (window.poz === 3) {
			this.playVideoById('2_v4');
		}
		
		this.gameState = this.GAME_STATE.RESULT;
		if (context) context.play();
	}
	
	onAllAnimationsLoaded() {
		console.log('🔧 AnimationManager: все анимации загружены');
		this.initDrawCanvas();
		this.resizeContainer();
		this.setupVideoEndHandlers();
	}
	
	onAnimationSwitched(animId) {
		console.log('🔄 AnimationManager: переключено на анимацию ' + animId);
		this.stopFrameMonitoring();
		this.disableDrawing();
		this.hideAllVideos();
		
		this.currentAnimationId = animId;
		this.currentConfig = this.animations[animId];
		this.gameState = this.GAME_STATE.IDLE;
		this.introVideoEnded = false;
		
		window.act1 = 0; window.act2 = 0; window.act3 = 0; window.act4 = 0;
		window.tr = 1; window.poz = 1;
		
		this.highlightActiveButton();
		this.startFrameMonitoring();
		
		if (exportRoot) {
			exportRoot.gotoAndStop(0);
		}
	}
	
	playIntroVideo() {
		if (this.currentConfig && this.currentConfig.videos.intro) {
			this.playVideoById(this.currentConfig.videos.intro);
			this.introVideoEnded = false;
		}
	}
	
	startFrameMonitoring() {
		this.stopFrameMonitoring();
		var self = this;
		this.lastFrame = -1;
		this.frameCheckInterval = setInterval(function() {
			self.checkFrame();
		}, 100);
		console.log('👁 Мониторинг кадров запущен для анимации ' + this.currentAnimationId);
	}
	
	stopFrameMonitoring() {
		if (this.frameCheckInterval) {
			clearInterval(this.frameCheckInterval);
			this.frameCheckInterval = null;
		}
	}
	
	checkFrame() {
		if (!exportRoot || !this.currentConfig) return;
		
		var currentFrame = exportRoot.currentFrame;
		if (currentFrame === this.lastFrame) return;
		this.lastFrame = currentFrame;
		
		console.log('📍 Анимация ' + this.currentAnimationId + ', кадр: ' + currentFrame + ', состояние: ' + this.gameState);
		
		// Анимация 2: проверка кадра выбора силы
		if (this.currentAnimationId === 2) {
			if (currentFrame === 9 && this.gameState === this.GAME_STATE.IDLE && this.introVideoEnded) {
				console.log('⚡ Anim2: достигнут кадр 9, запуск выбора силы');
				this.gameState = this.GAME_STATE.POWER;
				
				// Автоматически вызываем go2 через небольшую задержку
				var self = this;
				setTimeout(function() {
					if (window.go2 && exportRoot) {
						console.log('⚡ Автоматический вызов go2');
						window.go2(exportRoot);
					}
				}, 500);
			}
		}
		
		// Анимация 3: проверка кадра выбора траектории
		if (this.currentAnimationId === 3) {
			if (currentFrame === 9 && this.gameState === this.GAME_STATE.IDLE && this.introVideoEnded) {
				console.log('🎯 Anim3: достигнут кадр 9, запуск рисования траектории');
				this.gameState = this.GAME_STATE.TRAJECTORY;
				this.enableDrawing();
				if (exportRoot) exportRoot.stop();
			}
		}
	}
	
	startAnimation(animationId) {
		animationId = parseInt(animationId);
		if (!this.animations[animationId]) return;
		
		console.log('🚀 Запуск анимации ' + animationId);
		
		if (typeof switchToAnimation === 'function') {
			switchToAnimation(animationId);
		}
		
		// Запускаем анимацию после переключения
		var self = this;
		setTimeout(function() {
			if (exportRoot) {
				exportRoot.gotoAndStop(0);
				exportRoot.play();
			}
			self.playIntroVideo();
		}, 300);
	}
	
	highlightActiveButton() {
		var buttons = document.querySelectorAll('#animationButtons button');
		buttons.forEach((button) => {
			var buttonAnimId = parseInt(button.dataset.animationId);
			if (buttonAnimId === this.currentAnimationId) {
				button.style.background = '#FDBA01'; button.style.color = '#000';
			} else {
				button.style.background = 'rgba(0, 0, 0, 0.7)'; button.style.color = '#FDBA01';
			}
		});
	}
	
	playVideoById(videoId) {
		if (!videoId) return;
		this.hideAllVideos();
		this.showVideo(videoId);
		this.playVideo(videoId);
		console.log('▶ Воспроизведение: ' + videoId);
	}
	
	// ========== РИСОВАНИЕ ТРАЕКТОРИИ ==========
	
	initDrawCanvas() {
		this.drawCanvas = document.createElement('canvas');
		this.drawCanvas.style.cssText = `
			position: absolute; top: 0; left: 0; width: 100%; height: 100%;
			z-index: 1000; pointer-events: auto; display: none;
		`;
		this.drawCanvas.id = 'drawCanvas';
		var container = document.getElementById('animation_container');
		if (container) container.appendChild(this.drawCanvas);
		this.drawCtx = this.drawCanvas.getContext('2d');
		
		this.drawCanvas.addEventListener('mousedown', (e) => this.handleDrawMouseDown(e));
		this.drawCanvas.addEventListener('touchstart', (e) => this.handleDrawTouchStart(e), { passive: false });
		window.addEventListener('mousemove', (e) => this.handleDrawMouseMove(e));
		window.addEventListener('touchmove', (e) => this.handleDrawTouchMove(e), { passive: false });
		window.addEventListener('mouseup', (e) => this.handleDrawMouseUp(e));
		window.addEventListener('touchend', (e) => this.handleDrawTouchEnd(e));
	}
	
	updateDrawGeometry() {
		if (!this.drawCanvas) return;
		var container = document.getElementById('animation_container');
		if (!container) return;
		this.canvasWidth = container.offsetWidth;
		this.canvasHeight = container.offsetHeight;
		this.drawCanvas.width = this.canvasWidth;
		this.drawCanvas.height = this.canvasHeight;
		this.cx = this.canvasWidth / 2;
		this.cy = this.canvasHeight * 0.55;
		if (this.currentConfig && this.currentConfig.triangle) {
			var tri = this.currentConfig.triangle;
			var BASE_RATIO = 2 * Math.tan(tri.apexAngle / 2);
			this.H = Math.min(this.canvasWidth, this.canvasHeight) * tri.heightRatio;
			this.W = this.H * BASE_RATIO;
			this.zoneBoundaries.leftThird = -this.W/2 + this.W * tri.zoneProportions.left;
			this.zoneBoundaries.rightThird = this.zoneBoundaries.leftThird + this.W * tri.zoneProportions.center;
		}
	}
	
	worldToLocal(wx, wy) {
		var rotation = (this.currentConfig && this.currentConfig.triangle) ? this.currentConfig.triangle.rotation : Math.PI / 6;
		var dx = wx - this.cx, dy = wy - this.cy;
		var cos = Math.cos(-rotation), sin = Math.sin(-rotation);
		return { x: dx * cos - dy * sin, y: dx * sin + dy * cos };
	}
	
	isInsideTriangle(localX, localY) {
		if (localY < -this.H/2 || localY > this.H/2) return false;
		var t = (localY + this.H/2) / this.H;
		var halfWidth = (this.W / 2) * (1 - t);
		return Math.abs(localX) <= halfWidth;
	}
	
	getZone(localX, localY) {
		if (localX <= this.zoneBoundaries.leftThird) return 'Лево';
		if (localX <= this.zoneBoundaries.rightThird) return 'Центр';
		return 'Право';
	}
	
	zoneToNumber(zone) {
		if (zone === 'Лево') return 1;
		if (zone === 'Центр') return 2;
		return 3;
	}
	
	redrawTriangle() {
		if (!this.drawCtx) return;
		this.drawCtx.clearRect(0, 0, this.canvasWidth, this.canvasHeight);
	}
	
	enableDrawing() {
		if (!this.drawCanvas) this.initDrawCanvas();
		this.drawingEnabled = true;
		this.drawCanvas.style.display = 'block';
		this.drawPoints = [];
		this.updateDrawGeometry();
	}
	
	disableDrawing() {
		this.drawingEnabled = false;
		this.isDrawing = false;
		this.drawPoints = [];
		if (this.drawCanvas) {
			this.drawCanvas.style.display = 'none';
			if (this.drawCtx) this.drawCtx.clearRect(0, 0, this.canvasWidth, this.canvasHeight);
		}
	}
	
	handleDrawMouseDown(e) { if (!this.drawingEnabled || this.gameState !== this.GAME_STATE.TRAJECTORY) return; e.preventDefault(); this.startDrawing(e.clientX, e.clientY); }
	handleDrawMouseMove(e) { if (!this.isDrawing || !this.drawingEnabled) return; e.preventDefault(); this.continueDrawing(e.clientX, e.clientY); }
	handleDrawMouseUp(e) { if (!this.isDrawing || !this.drawingEnabled) return; e.preventDefault(); this.endDrawing(); }
	handleDrawTouchStart(e) { if (!this.drawingEnabled || this.gameState !== this.GAME_STATE.TRAJECTORY) return; e.preventDefault(); this.startDrawing(e.touches[0].clientX, e.touches[0].clientY); }
	handleDrawTouchMove(e) { if (!this.isDrawing || !this.drawingEnabled) return; e.preventDefault(); this.continueDrawing(e.touches[0].clientX, e.touches[0].clientY); }
	handleDrawTouchEnd(e) { if (!this.isDrawing || !this.drawingEnabled) return; e.preventDefault(); this.endDrawing(); }
	
	startDrawing(clientX, clientY) {
		var rect = this.drawCanvas.getBoundingClientRect();
		var mx = clientX - rect.left, my = clientY - rect.top;
		var local = this.worldToLocal(mx, my);
		if (this.isInsideTriangle(local.x, local.y)) {
			this.isDrawing = true;
			this.drawPoints = [{ x: mx, y: my }];
		}
	}
	continueDrawing(clientX, clientY) {
		var rect = this.drawCanvas.getBoundingClientRect();
		var mx = clientX - rect.left, my = clientY - rect.top;
		var local = this.worldToLocal(mx, my);
		if (this.isInsideTriangle(local.x, local.y)) {
			this.drawPoints.push({ x: mx, y: my });
		}
	}
	endDrawing() {
		this.isDrawing = false;
		if (this.drawPoints.length > 1 && this.gameState === this.GAME_STATE.TRAJECTORY) {
			var lastPoint = this.drawPoints[this.drawPoints.length - 1];
			var local = this.worldToLocal(lastPoint.x, lastPoint.y);
			var zone = this.getZone(local.x, local.y);
			window.tr = this.zoneToNumber(zone);
			console.log('🎯 Траектория: ' + zone + ' (' + window.tr + ')');
			this.gameState = this.GAME_STATE.POWER;
			this.disableDrawing();
			if (exportRoot) exportRoot.play();
		}
	}
	
	setupVideoEndHandlers() {
		var allVideoIds = [];
		for (var animId in this.animations) {
			var config = this.animations[animId];
			if (config.videos.intro) allVideoIds.push(config.videos.intro);
			for (var key in config.videos.results) allVideoIds.push(config.videos.results[key]);
		}
		allVideoIds = allVideoIds.filter((v, i, a) => a.indexOf(v) === i);
		
		var self = this;
		allVideoIds.forEach((videoId) => {
			var block = document.getElementById(videoId);
			if (!block) return;
			var video = block.querySelector('video');
			if (!video) return;
			video.addEventListener('ended', function() {
				video.pause();
				console.log('🏁 Видео закончилось: ' + videoId);
				
				// Проверяем, является ли видео intro для текущей анимации
				if (self.currentConfig && videoId === self.currentConfig.videos.intro) {
					console.log('🎬 Intro видео завершено для анимации ' + self.currentAnimationId);
					self.introVideoEnded = true;
					
					// Для анимации 1 устанавливаем act1
					if (videoId === '1_v1_1') window.act1 = 1;
				}
				
				// Устанавливаем флаги для анимации 1
				if (videoId === '1_v1_1') window.act1 = 1;
				if (videoId === '1_v2' || videoId === '1_v2_1') window.act2 = 1;
				if (videoId === '1_v3' || videoId === '1_v3_1') window.act3 = 1;
				if (videoId === '1_v4' || videoId === '1_v4_1') window.act4 = 1;
				
				// Для анимации 2: после завершения intro, если мы на кадре 9, запускаем выбор силы
				if (self.currentAnimationId === 2 && videoId === '2_v1') {
					console.log('🎬 Anim2: intro видео завершено, проверяем кадр...');
					// Небольшая задержка, чтобы анимация успела дойти до кадра 9
					setTimeout(function() {
						if (exportRoot && exportRoot.currentFrame >= 9 && self.gameState === self.GAME_STATE.IDLE) {
							console.log('⚡ Anim2: запуск выбора силы после intro');
							self.gameState = self.GAME_STATE.POWER;
							if (window.go2) {
								window.go2(exportRoot);
							}
						}
					}, 1000);
				}
			});
		});
		
		console.log('🎧 Обработчики завершения видео настроены');
	}
	
	hideAllVideos() {
		document.querySelectorAll('.video-block').forEach(function(block) {
			block.classList.remove('show');
			block.style.display = 'none';
			var video = block.querySelector('video');
			if (video) { video.pause(); video.currentTime = 0; }
		});
	}
	showVideo(blockId) {
		var block = document.getElementById(blockId);
		if (!block) return;
		block.style.display = 'block';
		block.classList.add('show');
	}
	playVideo(blockId) {
		var block = document.getElementById(blockId);
		if (!block) return;
		var video = block.querySelector('video');
		if (!video) return;
		video.currentTime = 0;
		video.play().catch(function(e) { console.log('Ошибка воспроизведения ' + blockId + ':', e); });
	}
	
	resizeContainer() {
		var container = document.getElementById('animation_container');
		if (!container) return;
		var windowWidth = window.innerWidth, windowHeight = window.innerHeight;
		var aspectRatio = 850 / 480;
		var newWidth, newHeight;
		if (windowWidth / windowHeight > aspectRatio) {
			newHeight = windowHeight; newWidth = newHeight * aspectRatio;
		} else {
			newWidth = windowWidth; newHeight = newWidth / aspectRatio;
		}
		container.style.width = newWidth + 'px';
		container.style.height = newHeight + 'px';
	}
}

window.addEventListener('load', () => {
	window.animationManager = new AnimationManager();
});
</script>
