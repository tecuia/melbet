<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        body, canvas {
            background-image: url(./image.png);
            background-size: cover;
        }
    </style>
</head>
<body>
    



    <script>
        (function() {
    // ---------- Параметры треугольника ----------
    // const ROTATION = -Math.PI / 4;           // поворот на 45° (по часовой)
    const ROTATION = 0;           // поворот на 45° (по часовой)
    const HEIGHT_RATIO = 0.5;                // высота как доля от минимального размера окна
    const APEX_ANGLE = 45 * Math.PI / 180;   // угол при вершине 45°
    const BASE_RATIO = 2 * Math.tan(APEX_ANGLE / 2); // ширина основания / высота ≈ 0.8284

    // ---------- Создание canvas ----------
    const canvas = document.createElement('canvas');
    canvas.style.position = 'fixed';
    canvas.style.top = '0';
    canvas.style.left = '0';
    canvas.style.width = '100%';
    canvas.style.height = '100%';
    canvas.style.zIndex = '9999';
    canvas.style.pointerEvents = 'auto';
    canvas.style.background = 'transparent';
    document.body.appendChild(canvas);

    const ctx = canvas.getContext('2d');

    // ---------- Состояние ----------
    let isDrawing = false;
    let points = [];                         // {x, y} в экранных координатах
    let canvasWidth, canvasHeight;
    let cx, cy;
    let H, W;                               // высота и ширина основания перевёрнутого треугольника

    // ---------- Геометрия ----------
    function updateGeometry() {
        canvasWidth = window.innerWidth;
        canvasHeight = window.innerHeight;
        canvas.width = canvasWidth;
        canvas.height = canvasHeight;
        cx = canvasWidth / 2;
        cy = canvasHeight / 2;
        H = Math.min(canvasWidth, canvasHeight) * HEIGHT_RATIO;
        W = H * BASE_RATIO;
    }

    // Экранные координаты → локальные (неповёрнутый треугольник с центром в 0,0)
    function worldToLocal(wx, wy) {
        const dx = wx - cx;
        const dy = wy - cy;
        const cos = Math.cos(-ROTATION);
        const sin = Math.sin(-ROTATION);
        return {
            x: dx * cos - dy * sin,
            y: dx * sin + dy * cos
        };
    }

    // Проверка попадания внутрь перевёрнутого треугольника
    function isInsideTriangle(localX, localY) {
        if (localY < -H/2 || localY > H/2) return false;
        // t = 0 у верхнего основания, t = 1 у вершины
        const t = (localY + H/2) / H;
        const halfWidth = (W / 2) * (1 - t);
        return Math.abs(localX) <= halfWidth;
    }

    // Определение зоны (Лево / Центр / Право) по положению относительно основания
    function getZone(localX, localY) {
        // Используем только localX относительно ширины основания
        const left = -W / 2;
        const width = W;
        const relative = (localX - left) / width; // 0…1
        if (relative < 1 / 3) return 'Лево';
        if (relative < 2 / 3) return 'Центр';
        return 'Право';
    }

    // ---------- Отрисовка ----------
    function drawTriangle() {
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(ROTATION);

        // Заливка полупрозрачным, чтобы видеть границы области рисования
        ctx.beginPath();
        ctx.moveTo(-W/2, -H/2);
        ctx.lineTo(0, H/2);
        ctx.lineTo(W/2, -H/2);
        ctx.closePath();
        ctx.fillStyle = 'rgba(255, 255, 255, 0.08)';
        ctx.fill();

        // Рисуем только две боковые стороны (без верхнего основания)
        ctx.beginPath();
        ctx.moveTo(-W/2, -H/2);
        ctx.lineTo(0, H/2);
        ctx.lineTo(W/2, -H/2);
        ctx.strokeStyle = 'rgba(0, 120, 255, 0.9)';
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.restore();
    }

    function drawTrajectory() {
        if (points.length < 2) return;
        ctx.save();
        ctx.beginPath();
        ctx.moveTo(points[0].x, points[0].y);
        for (let i = 1; i < points.length; i++) {
            ctx.lineTo(points[i].x, points[i].y);
        }
        ctx.strokeStyle = 'rgba(255, 50, 50, 0.9)';
        ctx.lineWidth = 3;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.stroke();
        ctx.restore();
    }

    function redraw() {
        ctx.clearRect(0, 0, canvasWidth, canvasHeight);
        drawTriangle();
        drawTrajectory();
    }

    // ---------- Обработчики мыши ----------
    function handleMouseDown(e) {
        // if (e.button !== 2) return;   // реагируем только на правую кнопку
        e.preventDefault();

        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;
        const local = worldToLocal(mx, my);

        if (isInsideTriangle(local.x, local.y)) {
            isDrawing = true;
            points = [{ x: mx, y: my }];
            redraw();
        }
    }

    function handleMouseMove(e) {
        if (!isDrawing) return;
        e.preventDefault();

        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;
        const local = worldToLocal(mx, my);

        if (isInsideTriangle(local.x, local.y)) {
            points.push({ x: mx, y: my });
            redraw();
        }
        // Если мышь вышла за пределы треугольника, новые точки не добавляются,
        // но режим рисования сохраняется до отпускания кнопки.
    }

    function handleMouseUp(e) {
        if (!isDrawing) return;
        e.preventDefault();
        isDrawing = false;

        if (points.length > 0) {
            const last = points[points.length - 1];
            const local = worldToLocal(last.x, last.y);
            const zone = getZone(local.x, local.y);
            alert('Конец траектории: ' + zone);
        }

        // Очищаем траекторию
        points = [];
        redraw();
    }

    function preventContextMenu(e) {
        e.preventDefault();
    }

    function onResize() {
        updateGeometry();
        redraw();
    }

    // ---------- Назначение слушателей ----------
    canvas.addEventListener('contextmenu', preventContextMenu);
    canvas.addEventListener('mousedown', handleMouseDown);
    window.addEventListener('mousemove', handleMouseMove);
    window.addEventListener('mouseup', handleMouseUp);
    window.addEventListener('resize', onResize);

    // Стартовая инициализация
    updateGeometry();
    redraw();
})();
    </script>
</body>
</html>
